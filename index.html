<!-- index.html är den grundläggande HTML-filen som laddas när du startar din React-app.
 
Script-taggen startar main.jsx som i sin tur läser in style.css-->

<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedTech Compliance Navigator</title>
    <!-- DENNA RAD FIXAR ALL DESIGN: -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DENNA MODUL LADDAR MERMAID GLOBALT UTAN ATT VITE KRASCHAR: -->
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({
        startOnLoad: false,
        theme: 'neutral',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, useMaxWidth: true }
      });
      // Gör motorn åtkomlig för din React-komponent via fönsterobjektet
      window.mermaid = mermaid;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
